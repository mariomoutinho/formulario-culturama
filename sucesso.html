<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envio concluído | Culturama</title>
  <style>
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #e9e4df;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }
    .success-card {
      background: white;
      max-width: 550px;
      padding: 2.5rem;
      border-radius: 2rem;
      text-align: center;
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2);
    }
    h1 {
      color: #2c5e2e;
      margin-bottom: 0.5rem;
    }
    p {
      color: #2d3e40;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      background: #2c5e2e;
      color: white;
      text-decoration: none;
      padding: 0.8rem 1.8rem;
      border-radius: 3rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover {
      background: #1f4521;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <h1>✅ Pesquisa enviada!</h1>
    <p>Obrigado por contribuir com a Culturama. Sua opinião é fundamental para construirmos um ambiente cultural mais diverso e inclusivo.</p>
    <a href="index.html">← Voltar ao formulário</a>
  </div>
</body>
</html>
